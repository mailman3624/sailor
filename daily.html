<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Check</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div id="sidebarMount"></div>
    <main class="main">
      <section class="panel">
        <div class="section-head"><div><h2 class="section-title">เช็กสต๊อกประจำวัน</h2><div class="section-subtitle">บันทึกการนับจริงและเทียบกับคงเหลือในระบบ</div></div></div>
        <form class="form-card" id="dailyForm">
          <div class="form-grid">
            <div class="field"><label for="dailyItem">รายการ</label><select id="dailyItem"></select></div>
            <div class="field"><label for="dailyDate">วันที่</label><input id="dailyDate" type="date"></div>
            <div class="field"><label for="dailyCount">จำนวนที่นับจริง</label><input id="dailyCount" type="number" min="0" value="0"></div>
            <div class="field full"><label for="dailyNote">หมายเหตุ</label><textarea id="dailyNote"></textarea></div>
          </div>
          <button class="primary-button" type="submit">บันทึกการเช็กสต๊อก</button>
        </form>
      </section>
      <section class="content-grid">
        <section class="panel">
          <div class="section-head"><div><h2 class="section-title">ผลล่าสุดของแต่ละรายการ</h2></div></div>
          <div class="table-wrap">
            <table><thead><tr><th>รหัส</th><th>ชื่อ</th><th>คงเหลือระบบ</th><th>เช็กจริงล่าสุด</th></tr></thead><tbody id="dailyTableBody"></tbody></table>
          </div>
        </section>
        <section class="panel">
          <div class="section-head"><div><h2 class="section-title">บันทึกล่าสุด</h2></div></div>
          <div class="grid" id="dailyLogs"></div>
        </section>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="shared.js"></script>
  <script>
    document.getElementById("sidebarMount").outerHTML = renderSidebar("daily.html");
    wireCommonActions(toast);
    app.populateItemOptions(dailyItem);
    dailyDate.value = app.today();
    dailyForm.addEventListener("submit", (event) => {
      event.preventDefault();
      app.addDailyCheck({ itemId: dailyItem.value, date: dailyDate.value, counted: Number(dailyCount.value), note: dailyNote.value.trim() });
      event.target.reset(); dailyDate.value = app.today(); app.populateItemOptions(dailyItem); toast("บันทึกการเช็กสต๊อกเรียบร้อย"); renderDaily();
    });
    function renderDaily() {
      dailyTableBody.innerHTML = app.state.items.map((item) => {
        const metric = app.metrics(item.id);
        const latest = app.state.dailyChecks.find((entry) => entry.itemId === item.id);
        return `<tr><td>${item.id}</td><td>${item.name}</td><td>${metric.currentStock} ${item.unit}</td><td>${latest ? `${latest.counted} ${item.unit} · ${app.formatDate(latest.date)}` : "-"}</td></tr>`;
      }).join("");
      dailyLogs.innerHTML = app.state.dailyChecks.slice(0, 8).map((entry) => `<div class="log-item"><strong>${app.findItem(entry.itemId)?.name || entry.itemId}</strong><div class="small-text">${app.formatDate(entry.date)}</div><div>นับจริง ${entry.counted} · ${entry.note || "ไม่มีหมายเหตุ"}</div></div>`).join("");
    }
    renderDaily();
  </script>
</body>
</html>
