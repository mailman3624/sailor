<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div id="sidebarMount"></div>
    <main class="main">
      <section class="hero">
        <div>
          <h2>Dashboard ภาพรวมการขายและสต๊อก</h2>
          <p>ดูว่าอะไรขายดี ของไหนใกล้หมด และยอดขายรายวันกำลังไปทิศทางไหน โดยไม่ต้องปนกับฟอร์มบันทึกข้อมูล</p>
        </div>
        <div class="hero-panel"><div class="hero-panel-grid" id="heroStats"></div></div>
      </section>
      <section class="panel"><div class="metric-grid" id="metricGrid"></div></section>
      <section class="content-grid">
        <section class="card chart-card">
          <div class="section-head"><div><h2 class="section-title">สินค้าที่เคลื่อนไหวมากที่สุด</h2><div class="section-subtitle">อ้างอิงจากจำนวนขายหรือเบิกใช้</div></div></div>
          <div class="bar-chart" id="barChart"></div>
        </section>
        <section class="card chart-card">
          <div class="section-head"><div><h2 class="section-title">แนวโน้มยอดขายรายวัน</h2><div class="section-subtitle">ใช้ดูจังหวะการเติมของ</div></div></div>
          <svg class="line-chart" id="lineChart" viewBox="0 0 640 220" preserveAspectRatio="none"></svg>
        </section>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="shared.js"></script>
  <script>
    document.getElementById("sidebarMount").outerHTML = renderSidebar("dashboard.html");
    wireCommonActions(toast);
    const stats = app.dashboardMetrics();
    document.getElementById("heroStats").innerHTML = `
      <div class="hero-stat"><span class="metric-label">จำนวนไอดี</span><strong>${stats.itemCount}</strong></div>
      <div class="hero-stat"><span class="metric-label">ต้องสั่งเพิ่ม</span><strong>${stats.reorderCount}</strong></div>
      <div class="hero-stat"><span class="metric-label">ยอดขายรวม</span><strong>${app.formatCurrency(stats.totalSales)}</strong></div>
      <div class="hero-stat"><span class="metric-label">คงเหลือรวม</span><strong>${stats.totalCurrent}</strong></div>`;
    document.getElementById("metricGrid").innerHTML = [
      ["รับเข้าเพิ่มทั้งหมด", stats.totalIncoming, "รวมธุรกรรมรับเข้าทุกวัน"],
      ["ขายหรือเบิกออก", stats.totalOutgoing, "ช่วยมองความเคลื่อนไหวสต๊อก"],
      ["รายการใกล้หมด", stats.reorderCount, "ต้องดูหน้ารายการสินค้าเพิ่ม"],
      ["ยอดขายรวม", app.formatCurrency(stats.totalSales), "มูลค่าจากรายการขายทั้งหมด"]
    ].map(([label, value, note]) => `<article class="metric-card"><div class="metric-label">${label}</div><strong>${value}</strong><div class="small-text">${note}</div></article>`).join("");
    const movers = app.state.items.map((item) => ({ name: item.name, value: app.state.stockOuts.filter((e) => e.itemId === item.id).reduce((s, e) => s + e.qty, 0) })).sort((a, b) => b.value - a.value).slice(0, 6);
    const max = Math.max(...movers.map((e) => e.value), 1);
    document.getElementById("barChart").innerHTML = movers.map((entry) => `<div class="bar-row"><div>${entry.name}</div><div class="bar-track"><div class="bar-fill" style="width:${(entry.value / max) * 100}%"></div></div><strong>${entry.value}</strong></div>`).join("");
    const points = app.salesTrend();
    const width = 640, height = 220, pad = 24, maxValue = Math.max(...points.map((p) => p.total), 1), stepX = points.length > 1 ? (width - pad * 2) / (points.length - 1) : 0;
    const coords = points.map((p, i) => ({ ...p, x: pad + i * stepX, y: height - pad - (p.total / maxValue) * (height - pad * 2) }));
    const path = coords.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
    document.getElementById("lineChart").innerHTML = `${coords.map((p) => `<line x1="${p.x}" y1="${p.y}" x2="${p.x}" y2="${height-pad}" stroke="rgba(23,50,77,0.06)"></line>`).join("")}<path d="${path}" fill="none" stroke="#0f4c5c" stroke-width="3"></path>${coords.map((p) => `<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="#0f4c5c"></circle><text x="${p.x}" y="${height-8}" font-size="11" text-anchor="middle" fill="#6d7c8f">${app.shortDate(p.date)}</text>`).join("")}`;
  </script>
</body>
</html>
