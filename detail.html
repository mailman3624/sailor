<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <div id="sidebarMount"></div>
    <main class="main">
      <section class="panel">
        <div class="section-head"><div><h2 class="section-title">เลือกรายการที่ต้องการดู</h2><div class="section-subtitle">เปลี่ยนสินค้าได้จาก dropdown นี้ หรือย้อนกลับไปหน้ารายการสินค้า</div></div></div>
        <div class="button-row">
          <select id="detailSelect"></select>
          <a class="secondary-button" href="items.html">ไปหน้ารายการสินค้า</a>
        </div>
      </section>
      <section class="panel">
        <div class="detail-layout">
          <div class="detail-art"></div>
          <div class="grid">
            <div class="button-row"><span class="status-pill" id="detailStatus"></span><button class="ghost-button" id="deleteCurrent" type="button">ลบรายการนี้</button></div>
            <h2 class="section-title" id="detailTitle"></h2>
            <div class="muted" id="detailDesc"></div>
            <div class="detail-grid" id="detailStats"></div>
          </div>
        </div>
      </section>
      <section class="content-grid">
        <section class="panel"><div class="section-head"><div><h2 class="section-title">วัตถุดิบที่ต้องใช้</h2></div></div><ul class="recipe-list" id="recipeList"></ul></section>
        <section class="panel"><div class="section-head"><div><h2 class="section-title">ขั้นตอนการทำ</h2></div></div><ol class="step-list" id="stepList"></ol></section>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="shared.js"></script>
  <script>
    document.getElementById("sidebarMount").outerHTML = renderSidebar("detail.html");
    wireCommonActions(toast);
    const select = document.getElementById("detailSelect");
    app.populateItemOptions(select);
    select.value = app.selectedItem().id;
    function renderDetailPage() {
      const item = app.selectedItem();
      const metric = app.metrics(item.id);
      document.getElementById("detailStatus").textContent = metric.currentStock <= item.reorderPoint ? "ต้องสั่งเพิ่ม" : "พร้อมใช้งาน";
      document.getElementById("detailStatus").className = metric.currentStock <= item.reorderPoint ? "status-pill warn" : "status-pill";
      document.getElementById("detailTitle").textContent = `${item.id} · ${item.name}`;
      document.getElementById("detailDesc").textContent = item.description;
      document.getElementById("detailStats").innerHTML = `<div class="mini-card"><div class="metric-label">คงเหลือ</div><strong>${metric.currentStock} ${item.unit}</strong></div><div class="mini-card"><div class="metric-label">จุดสั่งซื้อ</div><strong>${item.reorderPoint} ${item.unit}</strong></div><div class="mini-card"><div class="metric-label">ราคาต่อหน่วย</div><strong>${app.formatCurrency(item.price)}</strong></div>`;
      document.getElementById("recipeList").innerHTML = item.recipe.length ? item.recipe.map((r) => `<li><span>${r.name}</span><strong>${r.qty} ${r.unit}</strong></li>`).join("") : `<li>ยังไม่มีวัตถุดิบที่กำหนดไว้</li>`;
      document.getElementById("stepList").innerHTML = item.steps.length ? item.steps.map((step) => `<li>${step}</li>`).join("") : `<li>ยังไม่มีขั้นตอนที่กำหนดไว้</li>`;
    }
    select.addEventListener("change", () => { app.selectItem(select.value); renderDetailPage(); });
    document.getElementById("deleteCurrent").addEventListener("click", () => {
      const item = app.selectedItem();
      if (!confirm(`ต้องการลบ ${item.name} หรือไม่`)) return;
      try { app.deleteItem(item.id); location.reload(); } catch { toast("ต้องเหลืออย่างน้อย 1 รายการ"); }
    });
    renderDetailPage();
  </script>
</body>
</html>
